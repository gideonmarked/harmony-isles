<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harmony Isles</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0b0d12;
        overflow: hidden;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      #app canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #fps {
        position: fixed;
        top: 8px;
        left: 8px;
        color: #6ec1ff;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="fps">FPS: --</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
